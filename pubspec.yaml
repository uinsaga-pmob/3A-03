name: pabrik_kayu
description: "A new Flutter project."
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5+5
  fl_chart: ^0.69.0

  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.7
  sqflite: ^2.4.2
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
flutter_native_splash:
  color: "#F8F6F1"
  image: assets/logo pabrik kayu.png

flutter:
  uses-material-design: true
